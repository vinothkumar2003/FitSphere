# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/fitsphere?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sibi
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.auto-commit=true

# Logging
logging.level.root=INFO
logging.level.com.fitsphere=DEBUG
logging.level.org.springframework.boot.devtools=WARN
logging.level.org.hibernate.orm.deprecation=WARN
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=WARN

# Application Name
spring.application.name=FitSphere Backend

# Suppress Hibernate warnings
spring.jpa.properties.hibernate.jdbc.non_contextual_creation=true

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=planitrightoffice@gmail.com
spring.mail.password=pksmmmiohmkionfb
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Optional: Custom email properties
spring.mail.from=planitrightoffice@gmail.com
spring.mail.display-name=FitSphere Fitness Management

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationWithMinimum256BitLength
jwt.expiration=900000
jwt.encryption.key=encryptionKeyWith32Chars1234567890

# Redis Configuration (For OTP Storage)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000
spring.data.redis.password=
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0

# Local development helper: exposes the OTP in the signup response if email delivery fails.
app.otp.expose-in-response-on-email-failure=true

